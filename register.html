<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс JS | Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-light">
            <div class="container">
                <a class="navbar-brand" href="index.html">JS Курс</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="d-flex align-items-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <h2 class="text-center mb-4">Регистрация</h2>
                        <form>
                            <div class="mb-4">
                                <label for="name" class="form-label">Ваше имя</label>
                                <input type="text" class="form-control rounded-3" id="name" placeholder="Иван Иванов" required>
                            </div>
                            <div class="mb-4">
                                <label for="email" class="form-label">Ваша почта</label>
                                <input type="email" class="form-control rounded-3" id="email" placeholder="example@gmail.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control rounded-3" id="password" placeholder="••••••••" required>
                            </div>
                            <div class="mb-4">
                                <label for="confirm-password" class="form-label">Повтор пароля</label>
                                <input type="password" class="form-control rounded-3" id="confirm-password" placeholder="••••••••" required>
                            </div>
                            <div class="d-grid gap-2 col-8 mx-auto">
                                <button type="submit" class="btn btn-success btn-lg rounded-3">Зарегистрироваться</button>
                            </div>
                        </form>
                        <p class="text-center mt-4">
                            Есть аккаунт? <a href="login.html" class="text-success text-decoration-none">Войти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-5">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5>Наши контакты:</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-white-50 text-decoration-none">Gmail</a></li>
                        <li><a href="#" class="text-white-50 text-decoration-none">Telegram</a></li>
                        <li><a href="#" class="text-white-50 text-decoration-none">TikTok</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>О нас</h5>
                    <p class="text-white-50">© 2026 JS Курс. Бесплатное обучение программированию.</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h5>Курсы</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-white-50 text-decoration-none">JavaScript</a></li>
                        <li><a class="text-white-50 text-decoration-line-through">PHP</a></li>
                        <li><a class="text-white-50 text-decoration-line-through">Python</a></li>
                        <li><a class="text-white-50 text-decoration-line-through">Java</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
</body>
</html>
