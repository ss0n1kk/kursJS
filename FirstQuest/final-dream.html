<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Fantasy JS | Сон</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat+Alternates:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Montserrat Alternates', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dream-container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            opacity: 0;
            animation: fadeInDream 2s forwards ease-in-out;
        }

        @keyframes fadeInDream {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .lady-image {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
            margin-bottom: 40px;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            color: #D4AF37;
            margin-bottom: 2rem;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .message-text {
            font-size: 1.1rem;
            line-height: 2;
            color: #ccc;
            margin-bottom: 4rem;
            font-style: italic;
        }

        .btn-wakeup {
            background: transparent;
            border: 2px solid #D4AF37;
            color: #D4AF37;
            font-family: 'Press Start 2P', cursive;
            padding: 18px 35px;
            font-size: 0.75rem;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .btn-wakeup:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 40px #D4AF37;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="dream-container">
        <img src="/assets/prologue1background.png" class="lady-image" alt="Дух Кода">
        
        <h1>Ты славно потрудился, юный маг...</h1>
        
        <p class="message-text">
            Сквозь зыбкий туман сна ты слышишь шепот... <br>
            "Первый Осколок получен. <br>
            Но тайны Переменных — это лишь врата в истинную магию. <br>
            Набирайся сил. Твой путь в WebLand только начинается. Впереди - новый город."
        </p>

        <a href="/map.html" class="btn-wakeup">ПРОСНУТЬСЯ (НА КАРТУ)</a>
    </div>
</body>
</html>
