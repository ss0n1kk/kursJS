<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Fantasy JS | Таверна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tavern.css">
    <link rel="stylesheet" href="css/header-footer.css">
    
    <script src="js/tavern.js" defer></script>
    <script src="../js/observer.js" defer></script>

        <link rel="shortcut icon" href="../assets/javascript icon.png" type="image/x-icon">
</head>
<body>

<header class="p-1">
    <div class="container text-center">
        <a class="text-decoration-none text-light mb-2" href="test.html" style="font-size: xx-large;">↩︎</a>
        <div class="progress mx-auto" style="max-width: 400px; height: 12px;">
            <div class="progress-bar bg-warning" role="progressbar" style="width: 80%;" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <p class="mt-2 small text-white-50">Прогресс: 80% — шаг 4 из 5</p>
        <h2 class="mb-4 text-white-50" style="font-size: 1rem;">Руины Цитадели | Таверна</h2>
    </div>
</header>

<main class="py-4">
    <div class="container py-4 reveal">
        <div class="chat-container shadow-lg">
            <div id="chat" style="height: 450px;"></div>

            <div id="inputPanel" class="text-center py-4">
                <button id="answerBtn" class="btn btn-warning px-5 py-3 fw-bold"></button>
            </div>

            <div id="acceptBtn" class="d-none d-flex justify-content-center text-center px-5 py-3 fw-bold">
                <a href="TEST_code_final.html" class="acceptBtnPfys btn btn-success px-5 py-3 fw-bold">ВЗЯТЬ КВЕСТ</a>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white py-5 text-center mt-auto">
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold">Почта для связи:</h5>
                <ul class="list-unstyled">
                    <li><p href="#" class="text-white-50 text-decoration-none">kursjsfeedback@icloud.com </p></li>
                    <li><button class="btn btn-outline-secondary mt-3" id="feedbackBtn">Обратная связь</button></li>
                </ul>
            </div>
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold">О нас</h5>
                <p class="text-white-50">© 2026 JS Курс. Бесплатное обучение программированию.</p>
            </div>
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold">Навигация</h5>
                <ul class="list-unstyled">
                    <li><a href="../index.html" class="text-white-50 text-decoration-none">На главную</a></li>
                    <li><a href="../map.html" class="text-white-50 text-decoration-none">Карта заданий</a></li>
                </ul>
            </div>
        </div>
    </div>
</footer>

<div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-warning">
                <h5 class="modal-title" id="feedbackLabel">Ваш отзыв о курсе</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="feedbackForm">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Как вас зовут?</label>
                        <input type="text" class="form-control" id="userName" placeholder="Имя" required>
                    </div>
                    <div class="mb-3">
                        <label for="userFeedback" class="form-label">Ваш отзыв / предложения</label>
                        <textarea class="form-control" id="userFeedback" rows="4" placeholder="Напишите ваш отзыв..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Ваша почта (По желанию)</label>
                        <input type="email" class="form-control" id="userEmail" placeholder="email@example.com">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-warning">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-warning" id="sendFeedbackBtn">Отправить отзыв</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/feedback.js" defer></script>
</body>
</html>
